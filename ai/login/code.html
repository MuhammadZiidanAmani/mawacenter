<style>
        body {
            background-color: theme('colors.background');
        }
        .login-card {
            box-shadow: 0 2px 8px rgba(11, 28, 48, 0.04);
        }

    body {
      min-height: max(884px, 100dvh);
    }

<body class="min-h-screen flex items-center justify-center p-container-padding font-body-lg text-on-surface">
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl p-8 login-card border border-outline-variant/30 flex flex-col gap-stack-gap">
<!-- Header Brand -->
<div class="flex flex-col items-center justify-center mb-section-margin pt-4">
<div class="w-16 h-16 bg-surface-container-low rounded-full flex items-center justify-center mb-4 border border-outline-variant/50">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary tracking-wider uppercase text-center flex flex-col items-center">
<span class="font-bold">MA'WA <span class="text-secondary-container">CENTER</span></span>
<span class="font-body-md text-body-md text-outline font-normal tracking-normal capitalize mt-1">Manajemen Keuangan</span>
</h1>
</div>
<!-- Welcome Text -->
<div class="mb-4">
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-2">Selamat Datang Kembali</h2>
<p class="font-body-md text-body-md text-outline">Silakan masuk untuk mengelola data keuangan Anda.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-input-gap" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-1 mb-2">
<label class="font-body-md text-body-md font-semibold text-on-surface" for="username">Username atau Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl">person</span>
</div>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-outline-variant bg-surface focus:ring-2 focus:ring-primary focus:border-primary transition-colors font-body-md text-body-lg text-on-surface placeholder-outline" id="username" placeholder="Masukkan username" type="text"/>
</div>
</div>
<div class="flex flex-col gap-1 mb-4">
<label class="font-body-md text-body-md font-semibold text-on-surface" for="password">Kata Sandi</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl">lock</span>
</div>
<input class="w-full pl-10 pr-12 py-3 rounded-lg border border-outline-variant bg-surface focus:ring-2 focus:ring-primary focus:border-primary transition-colors font-body-md text-body-lg text-on-surface placeholder-outline" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-xl" id="visibilityIcon">visibility_off</span>
</button>
</div>
<div class="flex justify-end mt-1">
<a class="font-body-md text-body-md text-primary font-medium hover:underline" href="#">Lupa Kata Sandi?</a>
</div>
</div>
<button class="w-full h-12 bg-primary-container text-on-primary rounded-lg font-headline-sm text-body-lg hover:bg-primary transition-colors shadow-sm flex justify-center items-center gap-2 mt-2" type="submit">
                Masuk
                <span class="material-symbols-outlined text-lg">login</span>
</button>
</form>
<!-- Footer -->
<div class="mt-section-margin text-center border-t border-outline-variant/30 pt-6">
<p class="font-body-md text-body-md text-outline">
                Belum punya akun? <a class="text-primary font-semibold hover:underline" href="#">Hubungi Admin</a>
</p>
</div>
</div>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibilityIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility_off';
            }
        }
    </script>
</body></html>
