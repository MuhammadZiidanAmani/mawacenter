<script data-purpose="interaction-logic">
    // Simple filter toggle logic
    const filterBtn = document.getElementById('toggleFilter');
    const filterContent = document.getElementById('filterContent');
    const filterArrow = document.getElementById('filterArrow');

    let isOpen = true; // Start open as per desktop ref usually showing filters

    filterBtn.addEventListener('click', () => {
      isOpen = !isOpen;
      if (isOpen) {
        filterContent.classList.remove('hidden');
        filterArrow.style.transform = 'rotate(0deg)';
      } else {
        filterContent.classList.add('hidden');
        filterArrow.style.transform = 'rotate(-90deg)';
      }
    });
  </script>
